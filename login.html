<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLens — 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --primary: #6366f1;
  --secondary: #7c3aed;
  --txt-1: #0f172a;
  --txt-2: #475569;
  --txt-3: #94a3b8;
  --border: rgba(99,102,241,0.15);
  --error: #dc2626;
  --success: #16a34a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f5f6ff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}

/* 배경 블롭 */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.07;
}
.blob-1 { width: 500px; height: 500px; background: var(--primary); top: -100px; left: -100px; }
.blob-2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; right: -100px; }

/* 카드 */
.card {
  position: relative;
  z-index: 1;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 8px 40px rgba(99,102,241,0.1), 0 2px 8px rgba(0,0,0,0.04);
}

/* 로고 */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
  justify-content: center;
}
.logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-size: 1.25rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 탭 */
.tabs {
  display: flex;
  background: #f5f6ff;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
}
.tab {
  flex: 1;
  height: 38px;
  border: none;
  border-radius: 9px;
  font-family: inherit;
  font-size: .875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 200ms ease;
  background: transparent;
  color: var(--txt-3);
}
.tab.active {
  background: #ffffff;
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(99,102,241,0.12);
}

/* 제목 */
.title {
  font-size: 1.375rem;
  font-weight: 800;
  color: var(--txt-1);
  margin-bottom: 6px;
  letter-spacing: -0.03em;
}
.subtitle {
  font-size: .875rem;
  color: var(--txt-2);
  margin-bottom: 28px;
  line-height: 1.5;
}

/* 폼 */
.field {
  margin-bottom: 16px;
}
label {
  display: block;
  font-size: .8125rem;
  font-weight: 600;
  color: var(--txt-2);
  margin-bottom: 6px;
}
input {
  width: 100%;
  height: 48px;
  padding: 0 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: inherit;
  font-size: .9375rem;
  color: var(--txt-1);
  background: #fafaff;
  outline: none;
  transition: border-color 200ms ease, box-shadow 200ms ease;
}
input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
  background: #fff;
}
input::placeholder { color: var(--txt-3); }

/* 버튼 */
.btn-submit {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: all 200ms ease;
  box-shadow: 0 4px 16px rgba(99,102,241,0.25);
}
.btn-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(99,102,241,0.3);
}
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* 메시지 */
.msg {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: .875rem;
  font-weight: 500;
  margin-bottom: 16px;
  display: none;
}
.msg.error {
  background: rgba(220,38,38,0.08);
  color: var(--error);
  border: 1px solid rgba(220,38,38,0.15);
  display: block;
}
.msg.success {
  background: rgba(22,163,74,0.08);
  color: var(--success);
  border: 1px solid rgba(22,163,74,0.15);
  display: block;
}

/* 하단 */
.divider {
  text-align: center;
  color: var(--txt-3);
  font-size: .75rem;
  margin: 20px 0 0;
}
</style>
</head>
<body>
<div class="bg" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">WorkLens</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
  </div>

  <!-- 로그인 폼 -->
  <div id="form-login">
    <div class="title">다시 돌아오셨군요!</div>
    <div class="subtitle">이메일과 비밀번호로 로그인하세요.</div>

    <div id="msg-login" class="msg"></div>

    <div class="field">
      <label for="login-email">이메일</label>
      <input type="email" id="login-email" placeholder="name@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="login-pw">비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button class="btn-submit" id="btn-login" onclick="login()">로그인</button>
    <p class="divider">계정이 없으신가요? 위에서 회원가입하세요.</p>
  </div>

  <!-- 회원가입 폼 -->
  <div id="form-signup" style="display:none">
    <div class="title">무료로 시작하세요</div>
    <div class="subtitle">14일 무료 체험. 신용카드 불필요.</div>

    <div id="msg-signup" class="msg"></div>

    <div class="field">
      <label for="signup-email">이메일</label>
      <input type="email" id="signup-email" placeholder="name@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="signup-pw">비밀번호 (6자 이상)</label>
      <input type="password" id="signup-pw" placeholder="비밀번호 설정" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="btn-signup" onclick="signup()">무료로 시작하기 ⚡</button>
    <p class="divider">이미 계정이 있으신가요? 위에서 로그인하세요.</p>
  </div>
</div>

<script>
// ===== Supabase 초기화 =====
const { createClient } = supabase
const _supabase = createClient(
  'https://usvpexgctezdbwwtlrgb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzdnBleGdjdGV6ZGJ3d3RscmdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjM2OTMsImV4cCI6MjA5MjUzOTY5M30.U2GXkZI-11rQCrVC91e739Ii84tTC-3IHYGGTal5mYE'
)

// 이미 로그인된 경우 대시보드로 이동
_supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'index.html'
})

// ===== 탭 전환 =====
function switchTab(tab) {
  const isLogin = tab === 'login'
  document.getElementById('form-login').style.display = isLogin ? 'block' : 'none'
  document.getElementById('form-signup').style.display = isLogin ? 'none' : 'block'
  document.getElementById('tab-login').classList.toggle('active', isLogin)
  document.getElementById('tab-signup').classList.toggle('active', !isLogin)
}

// ===== 메시지 표시 =====
function showMsg(id, text, type) {
  const el = document.getElementById(id)
  el.textContent = text
  el.className = 'msg ' + type
}

// ===== 로그인 =====
async function login() {
  const email = document.getElementById('login-email').value.trim()
  const pw = document.getElementById('login-pw').value
  const btn = document.getElementById('btn-login')

  if (!email || !pw) {
    showMsg('msg-login', '이메일과 비밀번호를 입력해주세요.', 'error')
    return
  }

  btn.disabled = true
  btn.textContent = '로그인 중...'

  const { error } = await _supabase.auth.signInWithPassword({ email, password: pw })

  if (error) {
    showMsg('msg-login', '이메일 또는 비밀번호가 올바르지 않아요.', 'error')
    btn.disabled = false
    btn.textContent = '로그인'
  } else {
    showMsg('msg-login', '로그인 성공! 대시보드로 이동합니다...', 'success')
    setTimeout(() => window.location.href = 'index.html', 800)
  }
}

// ===== 회원가입 =====
async function signup() {
  const email = document.getElementById('signup-email').value.trim()
  const pw = document.getElementById('signup-pw').value
  const btn = document.getElementById('btn-signup')

  if (!email || !pw) {
    showMsg('msg-signup', '이메일과 비밀번호를 입력해주세요.', 'error')
    return
  }
  if (pw.length < 6) {
    showMsg('msg-signup', '비밀번호는 6자 이상이어야 해요.', 'error')
    return
  }

  btn.disabled = true
  btn.textContent = '가입 중...'

  const { error } = await _supabase.auth.signUp({ email, password: pw })

  if (error) {
    showMsg('msg-signup', '가입 중 오류가 발생했어요. 다시 시도해주세요.', 'error')
    btn.disabled = false
    btn.textContent = '무료로 시작하기 ⚡'
  } else {
    showMsg('msg-signup', '가입 완료! 대시보드로 이동합니다...', 'success')
    setTimeout(() => window.location.href = 'index.html', 800)
  }
}

// 엔터키로 제출
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const isLogin = document.getElementById('form-login').style.display !== 'none'
    isLogin ? login() : signup()
  }
})
</script>
</body>
</html>
